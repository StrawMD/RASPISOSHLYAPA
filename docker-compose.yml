services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: raspisoshlyapa-web
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/data.db"
      PORT: "3000"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      AUTH_TRUST_HOST: "true"
    volumes:
      - ./data:/app/data
