services:
  web:
    # Образ собирается в CI (GitHub Actions) и публикуется в GHCR.
    # `docker compose pull` тянет готовый образ — на сервере НЕ собираем.
    # Для отката можно указать конкретный тег: WEB_IMAGE=ghcr.io/strawmd/raspisoshlyapa:<sha>
    # `build:` оставлен как локальный фолбэк (`docker compose up --build`).
    image: "${WEB_IMAGE:-ghcr.io/strawmd/raspisoshlyapa:latest}"
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/data/data.db"
      PORT: "3000"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      AUTH_TRUST_HOST: "true"
    volumes:
      - ./data:/app/data
