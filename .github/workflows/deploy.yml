name: Build & push image

# Собирает Docker-образ приложения и публикует его в GitHub Container
# Registry (GHCR). Сборка идёт на раннере GitHub (быстро, без нагрузки на
# боевой сервер). Сервер потом просто тянет готовый образ:
#   docker compose pull && docker compose up -d

on:
  push:
    branches: [main]
    # Не пересобираем, если поменялись только тексты/доки.
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/strawmd/raspisoshlyapa:latest
            ghcr.io/strawmd/raspisoshlyapa:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Образ опубликован" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/strawmd/raspisoshlyapa:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/strawmd/raspisoshlyapa:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Деплой на сервере: \`cd /opt/raspisoshlyapa && ./redeploy.sh\`" >> "$GITHUB_STEP_SUMMARY"
