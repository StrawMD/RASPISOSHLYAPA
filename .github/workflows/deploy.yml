name: Build & push image

# Собирает Docker-образ приложения и публикует его в GitHub Container
# Registry (GHCR). Сборка идёт на раннере GitHub (быстро, без нагрузки на
# боевой сервер). Сервер потом просто тянет готовый образ:
#   docker compose pull && docker compose up -d

on:
  push:
    branches: [main]
    # Не пересобираем, если поменялись только тексты/доки.
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (with retry)
        # docker/login-action не умеет ретраи, а GHCR изредка отдаёт 502.
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              echo "logged in"; exit 0
            fi
            echo "login attempt $i failed, retrying in 10s..."; sleep 10
          done
          echo "GHCR login failed after retries"; exit 1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/strawmd/raspisoshlyapa:latest
            ghcr.io/strawmd/raspisoshlyapa:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Образ опубликован" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/strawmd/raspisoshlyapa:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/strawmd/raspisoshlyapa:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Деплой на сервере: \`cd /opt/raspisoshlyapa && ./redeploy.sh\`" >> "$GITHUB_STEP_SUMMARY"
